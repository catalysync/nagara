{{- if not .Values.existingSecret }}
# Rendered from ``values.secrets.*``. For production, point ``existingSecret``
# at an externally-managed Secret (External Secrets Operator, Vault Agent,
# sealed-secrets, ...) and delete this templated copy from your values.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nagara-core.fullname" . }}
  labels:
    {{- include "nagara-core.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
