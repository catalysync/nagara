# Run with `uv run pre-commit run --all-files` or install once with
# `uv run pre-commit install` to wire it into `git commit`.
#
# Hooks intentionally mirror what `just check` runs in CI so failures
# surface locally before they hit a workflow run.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: 0.0.32
    hooks:
      - id: ty
