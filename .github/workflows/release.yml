name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # PyPI trusted publishing needs id-token: write; contents: read for checkout.
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/nagara
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: build wheel and sdist
        run: uv build

      - name: publish to pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
