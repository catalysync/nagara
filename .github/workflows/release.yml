name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nagara
          POSTGRES_PASSWORD: nagara
          POSTGRES_DB: nagara
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NAGARA_POSTGRES_HOST: 127.0.0.1
      NAGARA_POSTGRES_PORT: "5432"
      NAGARA_POSTGRES_USER: nagara
      NAGARA_POSTGRES_PWD: nagara
      NAGARA_POSTGRES_DB: nagara
      NAGARA_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-groups
      - run: uv run ruff format --check
      - run: uv run ruff check
      - run: uv run ty check
      - run: uv run pytest

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    # PyPI trusted publishing needs id-token: write; contents: read for checkout.
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/nagara
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: build wheel and sdist
        run: uv build

      - name: publish to pypi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
